<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Personal Journal</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col pb-20">

  <!-- ヘッダー -->
  <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
    <h1 class="text-xl font-bold"><i class="fa-solid fa-book-open mr-2"></i>My Journal</h1>
    <button id="btn-sync" class="text-white hover:text-indigo-200 transition">
      <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
    </button>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-grow p-4 space-y-6 max-w-md mx-auto w-full">

    <!-- 1. 新規投稿エリア -->
    <section class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
      <h2 class="text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Quick Post</h2>
      
      <!-- テキストエリア（改行対応） -->
      <textarea id="journal-text" rows="4" class="w-full border-0 focus:ring-0 resize-none placeholder-gray-400 text-base outline-none" placeholder="今の気持ちや、出来事を書きましょう..."></textarea>
      
      <!-- 写真プレビュー -->
      <div id="photo-preview-container" class="hidden my-2 relative">
        <img id="photo-preview" src="" class="w-full h-40 object-cover rounded-lg">
        <button id="btn-remove-photo" class="absolute top-2 right-2 bg-black/50 text-white rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <!-- 位置情報 & 日時表示 -->
      <div class="border-t border-gray-100 pt-3 my-3 text-xs text-gray-500 space-y-2">
        <div class="flex items-center justify-between">
          <span class="flex items-center"><i class="fa-solid fa-clock mr-1.5 text-indigo-500"></i><input type="datetime-local" id="journal-time" class="bg-transparent border-0 p-0 focus:ring-0 text-xs text-gray-600 cursor-pointer"></span>
        </div>
        <div class="flex items-center justify-between">
          <span class="flex items-center"><i class="fa-solid fa-location-dot mr-1.5 text-red-500"></i><span id="location-text">位置情報を取得中...</span></span>
          <button id="btn-edit-location" class="text-indigo-600 hover:underline font-medium">場所を変更</button>
        </div>
      </div>

      <!-- アクションツールバー -->
      <div class="flex justify-between items-center border-t border-gray-100 pt-3">
        <div class="flex space-x-4 text-gray-500">
          <label class="cursor-pointer hover:text-indigo-600 transition">
            <i class="fa-solid fa-image text-lg"></i>
            <input type="file" id="photo-input" accept="image/*" class="hidden">
          </label>
        </div>
        <button id="btn-submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-full text-sm font-semibold shadow-sm transition">投稿する</button>
      </div>
    </section>

    <!-- 検索バー -->
    <div class="relative">
      <input type="text" id="search-input" placeholder="投稿を検索..." class="w-full bg-white border border-gray-200 rounded-full py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-gray-400"></i>
    </div>

    <!-- 2. カレンダー & タイムライン切り替え -->
    <div class="flex bg-gray-100 p-1 rounded-xl">
      <button id="tab-timeline" class="flex-1 text-center py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-indigo-600">タイムライン</button>
      <button id="tab-calendar" class="flex-1 text-center py-2 text-sm font-medium rounded-lg text-gray-600">カレンダー</button>
    </div>

    <!-- カレンダー表示エリア -->
    <section id="calendar-section" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hidden">
      <div class="flex justify-between items-center mb-4">
        <button id="prev-month" class="p-1 text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="calendar-title" class="font-bold text-gray-700">2026年 7月</span>
        <button id="next-month" class="p-1 text-gray-600"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      <div class="grid grid-cols-7 gap-1 text-center text-xs font-semibold text-gray-400 mb-2">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
      </div>
      <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-sm">
        <!-- JSで生成 -->
      </div>
    </section>

    <!-- 3. タイムライン一覧 -->
    <section id="timeline-section" class="space-y-4">
      <!-- 投稿リスト -->
    </section>

  </main>

  <!-- フッターナビ -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2 px-6 flex justify-around items-center z-10 max-w-md mx-auto">
    <button class="flex flex-col items-center text-indigo-600">
      <i class="fa-solid fa-house text-lg"></i>
      <span class="text-[10px] mt-0.5">ホーム</span>
    </button>
    <button id="btn-analysis" class="flex flex-col items-center text-gray-400 hover:text-indigo-600 transition">
      <i class="fa-solid fa-chart-line text-lg"></i>
      <span class="text-[10px] mt-0.5">ウェルビーイング分析</span>
    </button>
  </div>

  <!-- Google Map対応 位置情報編集モーダル -->
  <div id="location-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-xl flex flex-col h-[550px]">
      <div class="p-4 border-b border-gray-100 flex justify-between items-center">
        <h3 class="font-bold text-gray-700">場所を修正</h3>
        <button id="btn-close-modal" class="text-gray-400"><i class="fa-solid fa-xmark"></i></button>
      </div>
      
      <!-- Google Places オートコンプリート入力欄 -->
      <div class="p-3 border-b border-gray-100 space-y-2 relative">
        <div class="relative">
          <input type="text" id="modal-search-input" autocomplete="off" placeholder="駅名、店舗、施設名を入力（例: bizcomfort府中）..." class="w-full border border-gray-200 rounded-lg pl-3 pr-10 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
      </div>

      <!-- 地図エリア（Google Map） -->
      <div id="google-map" class="flex-grow w-full bg-gray-100"></div>
      
      <!-- 選択された場所の表示 -->
      <div class="px-4 py-2.5 bg-indigo-50 border-t border-gray-100 text-xs flex items-center justify-between text-indigo-800">
        <span class="flex items-center min-w-0">
          <i class="fa-solid fa-location-crosshairs mr-1.5 text-indigo-500 shrink-0"></i>
          <span id="modal-selected-name" class="truncate font-medium">位置情報をロード中...</span>
        </span>
      </div>

      <div class="p-4 bg-gray-50 flex justify-end space-x-2 border-t border-gray-100">
        <button id="btn-cancel-location" class="px-4 py-2 text-sm text-gray-500 font-medium">キャンセル</button>
        <button id="btn-save-location" class="px-4 py-2 text-sm bg-indigo-600 text-white font-medium rounded-lg">この場所に決定</button>
      </div>
    </div>
  </div>

  <!-- 分析モーダル -->
  <div id="analysis-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-xl space-y-4">
      <div class="flex justify-between items-center border-b border-gray-100 pb-3">
        <h3 class="font-bold text-lg text-indigo-600"><i class="fa-solid fa-sparkles mr-2"></i>ウェルビーイング分析</h3>
        <button id="btn-close-analysis" class="text-gray-400"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="space-y-3">
        <div>
          <span class="text-xs text-gray-400 block font-semibold uppercase">分析対象</span>
          <p class="text-sm text-gray-600" id="analysis-period">直近の投稿に基づく</p>
        </div>
        <div class="bg-indigo-50 p-3.5 rounded-xl border border-indigo-100">
          <span class="text-xs text-indigo-500 block font-bold mb-1">💡 フィードバック・提案</span>
          <p class="text-sm text-indigo-900 leading-relaxed" id="analysis-result">
            分析中...
          </p>
        </div>
      </div>
      <div class="text-right">
        <button id="btn-confirm-analysis" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">閉じる</button>
      </div>
    </div>
  </div>

  <!-- ★★★ Google Maps JS SDK の読み込み ★★★ -->
  <!-- 以下の YOUR_API_KEY_HERE をご自身の Google Cloud Platform の APIキー に差し替えてください -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDZs4RAoKqvbAQ_vaFT7g3dhuBxXWeW3qs&libraries=places&callback=initGoogleMapLib" async defer></script>

  <script>
    // 状態管理
    let posts = JSON.parse(localStorage.getItem('my_journal_posts') || '[]');
    let currentLocation = { lat: 35.6724, lng: 139.4804, name: '東京都府中市' }; 
    let selectedLocation = { ...currentLocation };
    let tempImage = null;
    
    // Google Maps 用のオブジェクト
    let gMap = null;
    let gMarker = null;
    let gAutocomplete = null;
    let geocoder = null;
    let currentViewDate = new Date(); 

    // 初期設定
    document.addEventListener('DOMContentLoaded', () => {
      initTime();
      initLocation();
      renderTimeline(posts);
      setupEventListeners();
      initCalendar();
    });

    // 1. 日時の初期設定
    function initTime() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
      document.getElementById('journal-time').value = localISOTime;
    }

    // 2. ブラウザ標準のGPS位置情報取得
    function initLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            currentLocation.lat = position.coords.latitude;
            currentLocation.lng = position.coords.longitude;
            
            // Google SDK ロード完了後に詳細リバースジオコーディング
            if (geocoder) {
              reverseGeocode(currentLocation.lat, currentLocation.lng);
            } else {
              document.getElementById('location-text').textContent = "府中市付近 (現在地)";
            }
          },
          () => {
            document.getElementById('location-text').textContent = "位置情報を取得できませんでした";
          }
        );
      }
    }

    // ★★★ Google Maps SDK ロード完了後のコールバック ★★★
    function initGoogleMapLib() {
      geocoder = new google.maps.Geocoder();
      
      // 最初のリバースジオコーディングを実行
      reverseGeocode(currentLocation.lat, currentLocation.lng);
    }

    // 緯度経度からGoogleの検索データベースを使って日本語住所を逆引き
    function reverseGeocode(lat, lng) {
      const latlng = { lat: parseFloat(lat), lng: parseFloat(lng) };
      geocoder.geocode({ location: latlng }, (results, status) => {
        if (status === "OK" && results[0]) {
          // 最適な施設名または住所コンポーネントを切り出し
          const place = results[0];
          let formattedName = place.formatted_address;
          
          // 日本特有の「日本、〒...」をカット
          formattedName = formattedName.replace(/^日本、〒\d{3}-\d{4}\s*/, "");
          
          currentLocation.name = formattedName.split(" ").pop() || "現在地";
          document.getElementById('location-text').textContent = currentLocation.name;
          selectedLocation = { ...currentLocation };
        }
      });
    }

    // 3. Google Maps モーダル描画
    function initGoogleMapAndAutocomplete() {
      const mapDiv = document.getElementById('google-map');
      
      // マップが未生成の場合のみ生成
      if (!gMap) {
        gMap = new google.maps.Map(mapDiv, {
          center: { lat: selectedLocation.lat, lng: selectedLocation.lng },
          zoom: 16,
          disableDefaultUI: true,
          zoomControl: true,
          zoomControlOptions: {
            position: google.maps.ControlPosition.RIGHT_BOTTOM
          }
        });

        // ピン（マーカー）の設置
        gMarker = new google.maps.Marker({
          position: { lat: selectedLocation.lat, lng: selectedLocation.lng },
          map: gMap,
          draggable: true
        });

        // ドラッグイベント
        gMarker.addListener('dragend', () => {
          const pos = gMarker.getPosition();
          updateSelectedByLatLng(pos.lat(), pos.lng());
        });

        // マップクリックイベント
        gMap.addListener('click', (e) => {
          const lat = e.latLng.lat();
          const lng = e.latLng.lng();
          gMarker.setPosition({ lat, lng });
          updateSelectedByLatLng(lat, lng);
        });

        // ★★★ Google Places オートコンプリートのセットアップ ★★★
        // これにより、入力中にサクサク予測候補が出るようになります
        const input = document.getElementById('modal-search-input');
        gAutocomplete = new google.maps.places.Autocomplete(input, {
          componentRestrictions: { country: "jp" }, // 日本国内限定
          fields: ["address_components", "geometry", "name"]
        });

        // 候補が選択されたときの処理
        gAutocomplete.addListener('place_changed', () => {
          const place = gAutocomplete.getPlace();
          if (!place.geometry || !place.geometry.location) {
            return;
          }

          const lat = place.geometry.location.lat();
          const lng = place.geometry.location.lng();

          // マップとピンを移動
          gMap.setCenter({ lat, lng });
          gMap.setZoom(17);
          gMarker.setPosition({ lat, lng });

          // 状態の更新
          selectedLocation.lat = lat;
          selectedLocation.lng = lng;
          selectedLocation.name = place.name; // 「bizcomfort府中」などの店舗名・施設名が直接セットされます！
          document.getElementById('modal-selected-name').textContent = place.name;
        });

      } else {
        // 二回目以降は、現在のピン位置に中心を合わせる
        gMap.setCenter({ lat: selectedLocation.lat, lng: selectedLocation.lng });
        gMarker.setPosition({ lat: selectedLocation.lat, lng: selectedLocation.lng });
      }
    }

    // 緯度経度からピンを移動した際の、選択名（住所）更新処理
    function updateSelectedByLatLng(lat, lng) {
      selectedLocation.lat = lat;
      selectedLocation.lng = lng;
      
      geocoder.geocode({ location: { lat, lng } }, (results, status) => {
        if (status === "OK" && results[0]) {
          let name = results[0].formatted_address.replace(/^日本、〒\d{3}-\d{4}\s*/, "");
          selectedLocation.name = name;
          document.getElementById('modal-selected-name').textContent = name;
        } else {
          selectedLocation.name = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          document.getElementById('modal-selected-name').textContent = selectedLocation.name;
        }
      });
    }

    // 4. イベントハンドラ設定
    function setupEventListeners() {
      // 写真添付
      document.getElementById('photo-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
            tempImage = event.target.result;
            document.getElementById('photo-preview').src = tempImage;
            document.getElementById('photo-preview-container').classList.remove('hidden');
          };
          reader.readAsDataURL(file);
        }
      });

      // 写真クリア
      document.getElementById('btn-remove-photo').addEventListener('click', () => {
        tempImage = null;
        document.getElementById('photo-preview-container').classList.add('hidden');
        document.getElementById('photo-input').value = '';
      });

      // 新規投稿
      document.getElementById('btn-submit').addEventListener('click', () => {
        const text = document.getElementById('journal-text').value.trim();
        const time = document.getElementById('journal-time').value;

        if (!text && !tempImage) {
          alert('テキストか写真を入力してください。');
          return;
        }

        const newPost = {
          id: Date.now(),
          text: text,
          image: tempImage,
          time: time,
          location: { ...selectedLocation }
        };

        posts.unshift(newPost);
        localStorage.setItem('my_journal_posts', JSON.stringify(posts));

        // フォームクリア
        document.getElementById('journal-text').value = '';
        tempImage = null;
        document.getElementById('photo-preview-container').classList.add('hidden');
        document.getElementById('photo-input').value = '';
        initTime();

        renderTimeline(posts);
        initCalendar();
      });

      // 日記内検索
      document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = posts.filter(post => post.text.toLowerCase().includes(query));
        renderTimeline(filtered);
      });

      // 位置情報モーダルの開閉
      document.getElementById('btn-edit-location').addEventListener('click', () => {
        document.getElementById('location-modal').classList.remove('hidden');
        document.getElementById('modal-selected-name').textContent = selectedLocation.name;
        
        // Google SDKがロードされていることを確認して初期化
        if (typeof google === 'object' && typeof google.maps === 'object') {
          setTimeout(() => { initGoogleMapAndAutocomplete(); }, 150);
        } else {
          alert('Google Map SDKの読み込み中です。APIキーを確認してください。');
        }
      });

      const closeModal = () => {
        document.getElementById('location-modal').classList.add('hidden');
        document.getElementById('modal-search-input').value = '';
      };

      document.getElementById('btn-close-modal').addEventListener('click', closeModal);
      document.getElementById('btn-cancel-location').addEventListener('click', closeModal);

      document.getElementById('btn-save-location').addEventListener('click', () => {
        document.getElementById('location-text').textContent = selectedLocation.name;
        closeModal();
      });

      // タブの切り替え
      const tabTimeline = document.getElementById('tab-timeline');
      const tabCalendar = document.getElementById('tab-calendar');
      const timelineSec = document.getElementById('timeline-section');
      const calendarSec = document.getElementById('calendar-section');

      tabTimeline.addEventListener('click', () => {
        tabTimeline.className = "flex-1 text-center py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-indigo-600";
        tabCalendar.className = "flex-1 text-center py-2 text-sm font-medium rounded-lg text-gray-600";
        timelineSec.classList.remove('hidden');
        calendarSec.classList.add('hidden');
        renderTimeline(posts); 
      });

      tabCalendar.addEventListener('click', () => {
        tabCalendar.className = "flex-1 text-center py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-indigo-600";
        tabTimeline.className = "flex-1 text-center py-2 text-sm font-medium rounded-lg text-gray-600";
        calendarSec.classList.remove('hidden');
        timelineSec.classList.add('hidden');
      });

      // 分析
      document.getElementById('btn-analysis').addEventListener('click', runWellbeingAnalysis);
      document.getElementById('btn-close-analysis').addEventListener('click', () => {
        document.getElementById('analysis-modal').classList.add('hidden');
      });
      document.getElementById('btn-confirm-analysis').addEventListener('click', () => {
        document.getElementById('analysis-modal').classList.add('hidden');
      });
    }

    // 投稿を削除する関数
    function deletePost(id) {
      if (confirm('この日記（投稿）を完全に削除しますか？')) {
        posts = posts.filter(post => post.id !== id);
        localStorage.setItem('my_journal_posts', JSON.stringify(posts));
        renderTimeline(posts);
        initCalendar(); 
      }
    }

    // 5. タイムライン表示
    function renderTimeline(postsToRender) {
      const container = document.getElementById('timeline-section');
      container.innerHTML = '';

      if (postsToRender.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 py-8 text-sm">該当する投稿はありません</p>';
        return;
      }

      postsToRender.forEach(post => {
        const dateStr = new Date(post.time).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3 relative";
        
        card.innerHTML = `
          <div class="flex justify-between items-start pr-8 gap-2">
            <span class="text-xs text-indigo-500 font-semibold shrink-0">${dateStr}</span>
            <span class="text-xs text-gray-400 truncate text-right"><i class="fa-solid fa-location-dot mr-1 text-red-400"></i>${post.location.name}</span>
          </div>
          <!-- 削除用ゴミ箱ボタン -->
          <button class="absolute top-3 right-3 text-gray-300 hover:text-red-500 p-1 transition" onclick="deletePost(${post.id})">
            <i class="fa-solid fa-trash-can text-sm"></i>
          </button>
          ${post.image ? `<img src="${post.image}" class="w-full h-48 object-cover rounded-xl">` : ''}
          <p class="text-gray-700 whitespace-pre-wrap text-sm leading-relaxed">${escapeHTML(post.text)}</p>
        `;
        container.appendChild(card);
      });
    }

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 6. カレンダーロジック
    function initCalendar() {
      const calendarTitle = document.getElementById('calendar-title');
      const calendarDays = document.getElementById('calendar-days');
      calendarDays.innerHTML = '';

      const year = currentViewDate.getFullYear();
      const month = currentViewDate.getMonth();

      calendarTitle.textContent = `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        calendarDays.appendChild(emptyCell);
      }

      for (let day = 1; day <= lastDate; day++) {
        const cell = document.createElement('div');
        cell.className = "py-2 cursor-pointer rounded-full hover:bg-indigo-50 text-gray-700 relative flex items-center justify-center font-medium";
        cell.textContent = day;

        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasPost = posts.some(post => post.time.startsWith(dateKey));
        
        if (hasPost) {
          const dot = document.createElement('span');
          dot.className = "absolute bottom-1 w-1.5 h-1.5 bg-indigo-500 rounded-full";
          cell.appendChild(dot);
        }

        cell.addEventListener('click', () => {
          Array.from(calendarDays.children).forEach(child => child.classList.remove('bg-indigo-600', 'text-white'));
          cell.classList.add('bg-indigo-600', 'text-white');

          const filtered = posts.filter(post => post.time.startsWith(dateKey));
          
          document.getElementById('tab-timeline').click();
          renderTimeline(filtered);
        });

        calendarDays.appendChild(cell);
      }

      document.getElementById('prev-month').onclick = () => {
        currentViewDate.setMonth(currentViewDate.getMonth() - 1);
        initCalendar();
      };
      document.getElementById('next-month').onclick = () => {
        currentViewDate.setMonth(currentViewDate.getMonth() + 1);
        initCalendar();
      };
    }

    // 7. 簡易ウェルビーイング分析
    function runWellbeingAnalysis() {
      document.getElementById('analysis-modal').classList.remove('hidden');
      const resultArea = document.getElementById('analysis-result');
      const periodArea = document.getElementById('analysis-period');
      
      if (posts.length === 0) {
        periodArea.textContent = "投稿がありません";
        resultArea.textContent = "分析するデータが不足しています。";
        return;
      }

      const recentText = posts.slice(0, 5).map(p => p.text).join(" ");
      periodArea.textContent = `直近 ${Math.min(posts.length, 5)} 件の投稿を分析`;

      const activeKeywords = ["散歩", "歩いた", "温泉", "銭湯", "サウナ", "風呂", "運動"];
      const relaxKeywords = ["ジャズ", "ピアノ", "音楽", "読書", "ゆったり", "のんびり"];

      let activeCount = 0;
      let relaxCount = 0;

      activeKeywords.forEach(k => { if (recentText.includes(k)) activeCount++; });
      relaxKeywords.forEach(k => { if (recentText.includes(k)) relaxCount++; });

      let advice = "日々のささやかな行動の記録は、ご自身の状態を客観的に見つめ直すための最高の手がかりになります。\n\n";

      if (activeCount > 0) {
        advice += "最近は散歩や温浴など、適度な身体活動が記録されているようです。これは心身の緊張をほぐし、自律神経のバランスを整えるのに素晴らしいアプローチです。\n\n";
      } else {
        advice += "少しデスクワークや室内での時間が長くなっているかもしれません。15分ほどの軽い散歩や、湯船にゆっくり浸かる時間を作るだけで、夜の休息の質がぐっと引き上がります。\n\n";
      }

      if (relaxCount > 0) {
        advice += "また、お気に入りの音楽を聴いたり趣味に没頭したりする『デジタルから少し離れる静寂の時間』が確保できているようです。心の調和が綺麗に保たれています。";
      } else {
        advice += "夜のルーティンとして、照明を少し落とし、心地よいインストゥルメンタルやピアノの音色に耳を傾ける時間を取り入れてみてはいかがでしょうか。";
      }

      resultArea.textContent = advice;
    }
  </script>
